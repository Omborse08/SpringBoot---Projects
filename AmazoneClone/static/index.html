<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone - Admin & Shop Portal</title>
    <style>
        :root {
            --amazon-blue: #131921;
            --amazon-light: #232f3e;
            --amazon-orange: #febd69;
            --amazon-orange-hover: #f3a847;
            --bg-gray: #eaeded;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-gray); color: #333; padding-bottom: 50px; }

        /* Navbar */
        header {
            background-color: var(--amazon-blue);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 24px; font-weight: bold; color: white; text-decoration: none; }
        .logo span { color: var(--amazon-orange); }
        .nav-actions { display: flex; gap: 20px; align-items: center; }
        .user-badge { background: var(--amazon-light); padding: 5px 12px; border-radius: 4px; border: 1px solid #555; }

        /* Main Layout */
        .container { max-width: 1300px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr; gap: 30px; }

        @media(min-width: 900px) {
            .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        }

        /* Cards/Sections */
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card h2 { margin-bottom: 15px; color: var(--amazon-blue); border-bottom: 2px solid var(--bg-gray); padding-bottom: 8px; }

        /* Forms */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 6px; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #a6a6a6; border-radius: 3px; outline: none; }
        .form-group input:focus { border-color: var(--amazon-orange); box-shadow: 0 0 3px var(--amazon-orange); }

        btn, button { background: var(--amazon-orange); border: 1px solid #a88734; padding: 8px 15px; cursor: pointer; border-radius: 3px; font-weight: 5px; }
        btn:hover, button:hover { background: var(--amazon-orange-hover); }
        .btn-danger { background: #cc0c39; border-color: #840018; color: white; }
        .btn-danger:hover { background: #b10931; }
        .btn-secondary { background: #e7e9ec; border-color: #adb1b8; color: black; }
        .btn-secondary:hover { background: #e0e2e5; }

        /* Product Grid */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: white; border: 1px solid #e2e2e2; border-radius: 4px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .product-img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 10px; }
        .product-title { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .product-desc { font-size: 13px; color: #565959; margin-bottom: 10px; height: 40px; overflow: hidden; text-overflow: ellipsis; }
        .product-price { font-size: 18px; font-weight: bold; color: #B12704; margin-bottom: 8px; }
        .product-stock { font-size: 12px; color: #007600; margin-bottom: 12px; }
        .product-stock.out { color: #B12704; }

        /* Cart Section */
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #ddd; }
        .cart-item-details { display: flex; align-items: center; gap: 15px; }
        .cart-item-img { width: 50px; height: 50px; object-fit: contain; }
        .qty-counter { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        .qty-btn { padding: 2px 8px; font-size: 12px; }
        .total-price-box { margin-top: 15px; text-align: right; font-size: 18px; font-weight: bold; color: #B12704; }

        /* Toast Exceptions / Logs */
        #log-panel { position: fixed; bottom: 20px; right: 20px; max-width: 350px; z-index: 1000; }
        .toast { background: #333; color: white; padding: 12px 20px; border-radius: 4px; margin-top: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; }
        .toast.error { background: #cc0c39; }
        .toast.success { background: #007600; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">amazon<span>clone</span></a>
    <div class="nav-actions">
        <div class="user-badge">
            Active Customer ID: <span id="current-customer-display">None (Set below)</span>
        </div>
    </div>
</header>

<div class="container">

    <div class="admin-grid">
        <div class="card">
            <h2>1. Customer Authorization</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="cust-username" placeholder="e.g., rahul_123">
            </div>
            <div class="form-group">
                <label>Password (7-25 chars)</label>
                <input type="password" id="cust-password" placeholder="******">
            </div>
            <button onclick="createCustomer()">Register Customer</button>
            <hr style="margin:15px 0; border: 0; border-top: 1px solid #eee;">
            <div class="form-group">
                <label>Switch Active Customer Session (Enter Existing ID)</label>
                <input type="number" id="cust-session-id" placeholder="Enter Customer ID">
            </div>
            <button class="btn-secondary" onclick="switchCustomer()">Login / Switch ID</button>
        </div>

        <div class="card">
            <h2 id="product-form-title">2. Add New Product</h2>
            <input type="hidden" id="prod-id">
            <div class="form-group">
                <label>Product Title</label>
                <input type="text" id="prod-name">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="prod-desc">
            </div>
            <div class="form-group">
                <label>Product Image Direct URL</label>
                <input type="text" id="prod-image" placeholder="https://images-na.ssl-images-amazon.com/...">
            </div>
            <div class="form-group">
                <label>Stock Quantity (Max 20)</label>
                <input type="number" id="prod-qty" min="1" max="20">
            </div>
            <div class="form-group">
                <label>Price (₹3000 - ₹300000)</label>
                <input type="number" id="prod-price" min="3000" max="300000">
            </div>
            <button id="btn-product-submit" onclick="saveProduct()">Save Product</button>
            <button id="btn-product-cancel" class="btn-secondary" style="display:none;" onclick="resetProductForm()">Cancel Edit</button>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 2.5fr 1.2fr; gap: 20px; flex-wrap: wrap;">

        <div>
            <h2 style="margin-bottom: 15px;">Available Products</h2>
            <div class="products-grid" id="products-container">
            </div>
        </div>

        <div class="card" style="align-self: start;">
            <h2>Your Shopping Cart</h2>
            <div id="cart-items-container">
                <p style="color:#565959; text-align:center;">Select a Customer ID to view cart items.</p>
            </div>
            <div class="total-price-box" id="cart-total-box" style="display:none;">
                Total Bill: ₹<span id="cart-total-amount">0</span>
            </div>
        </div>
    </div>

</div>

<div id="log-panel"></div>

<script>
    const API_BASE = "http://localhost:8080/api";
    let activeCustomerId = null;

    // Init setup on startup
    window.onload = function() {
        loadAllProducts();
    };

    // UI Logger Center for Exception Catch blocks
    function showNotification(message, isError = false) {
        const logPanel = document.getElementById('log-panel');
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : 'success'}`;
        toast.innerHTML = `<span>${message}</span><button style="background:none; border:none; color:white; margin-left:10px;" onclick="this.parentElement.remove()">X</button>`;
        logPanel.appendChild(toast);
        setTimeout(() => { toast.remove(); }, 6000);
    }

    // Generic JSON error processor mapping to MethodArgumentNotValidException or ProperExceptionHandler
    async function handleResponseError(response) {
        try {
            const data = await response.json();
            if (data.message) {
                showNotification(data.message, true);
            } else {
                // MethodArgumentNotValidException field maps handling
                let errors = Object.values(data).join(", ");
                showNotification(errors || "Validation error occurred!", true);
            }
        } catch(e) {
            showNotification("An unexpected server communication flaw occurred.", true);
        }
    }

    // --- CUSTOMER MANAGEMENT ---
    async function createCustomer() {
        const username = document.getElementById('cust-username').value;
        const password = document.getElementById('cust-password').value;

        const res = await fetch(`${API_BASE}/customer`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if(res.ok) {
            const txt = await res.text();
            showNotification(txt);
            document.getElementById('cust-username').value = '';
            document.getElementById('cust-password').value = '';
        } else {
            handleResponseError(res);
        }
    }

    function switchCustomer() {
        const idVal = document.getElementById('cust-session-id').value;
        if(!idVal) return showNotification("Please pass a valid ID number!", true);

        activeCustomerId = parseInt(idVal);
        document.getElementById('current-customer-display').innerText = `ID: ${activeCustomerId}`;
        showNotification(`Switched interface focus to Customer ID ${activeCustomerId}`);
        loadCustomerCart();
    }

    // --- PRODUCT OPERATIONS ---
    async function loadAllProducts() {
        const res = await fetch(`${API_BASE}/product`);
        if(res.ok) {
            const products = await res.json();
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            if(products.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align:center; padding:20px;">No warehouse products loaded yet.</p>';
                return;
            }

            products.forEach(p => {
                container.innerHTML += `
                        <div class="product-card">
                            <img src="${p.image_data}" class="product-img" onerror="this.src='https://placehold.co/400x400?text=No+Image+Found'">
                            <div>
                                <div class="product-title">${p.name}</div>
                                <div class="product-desc">${p.description}</div>
                                <div class="product-price">₹${p.price}</div>
                                <div class="product-stock ${p.quantity === 0 ? 'out' : ''}">
                                    ${p.quantity > 0 ? `Stock Available: ${p.quantity}` : 'Out of Stock!'}
                                </div>
                            </div>
                            <div style="display:flex; flex-direction:column; gap:6px; margin-top:10px;">
                                <div style="display:flex; gap:4px;">
                                    <input type="number" id="qty-input-${p.id}" value="1" min="1" max="20" style="width:50px; text-align:center;">
                                    <button style="flex:1; font-size:13px;" onclick="addToCart(${p.id})">Add to Cart</button>
                                </div>
                                <div style="display:flex; gap:4px; justify-content:space-between;">
                                    <button class="btn-secondary" style="flex:1; padding:4px;" onclick="editProductFieldSetup(${JSON.stringify(p).replace(/"/g, '&quot;')})">Edit</button>
                                    <button class="btn-danger" style="flex:1; padding:4px;" onclick="deleteProduct(${p.id})">Delete</button>
                                </div>
                            </div>
                        </div>
                    `;
            });
        }
    }

    async function saveProduct() {
        const id = document.getElementById('prod-id').value;
        const name = document.getElementById('prod-name').value;
        const description = document.getElementById('prod-desc').value;
        const image_data = document.getElementById('prod-image').value;
        const quantity = parseInt(document.getElementById('prod-qty').value);
        const price = parseInt(document.getElementById('prod-price').value);

        const payload = { name, description, image_data, quantity, price };

        let url = `${API_BASE}/product`;
        let method = 'POST';

        // Checking if update dynamic context flag is running
        if(id) {
            url = `${API_BASE}/product?id=${id}`;
            method = 'PUT';
            payload.id = parseInt(id); // Inject target updating ID structure mapping
        }

        const res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if(res.ok) {
            const msg = await res.text();
            showNotification(msg);
            resetProductForm();
            loadAllProducts();
            if(activeCustomerId) loadCustomerCart();
        } else {
            handleResponseError(res);
        }
    }

    function editProductFieldSetup(product) {
        document.getElementById('product-form-title').innerText = "Edit Existing Product";
        document.getElementById('prod-id').value = product.id;
        document.getElementById('prod-name').value = product.name;
        document.getElementById('prod-desc').value = product.description;
        document.getElementById('prod-image').value = product.image_data;
        document.getElementById('prod-qty').value = product.quantity;
        document.getElementById('prod-price').value = product.price;

        document.getElementById('btn-product-submit').innerText = "Update Entity Details";
        document.getElementById('btn-product-cancel').style.display = "inline-block";
    }

    function resetProductForm() {
        document.getElementById('product-form-title').innerText = "2. Add New Product";
        document.getElementById('prod-id').value = '';
        document.getElementById('prod-name').value = '';
        document.getElementById('prod-desc').value = '';
        document.getElementById('prod-image').value = '';
        document.getElementById('prod-qty').value = '';
        document.getElementById('prod-price').value = '';

        document.getElementById('btn-product-submit').innerText = "Save Product";
        document.getElementById('btn-product-cancel').style.display = "none";
    }

    async function deleteProduct(id) {
        if(!confirm("Are you sure you want to drop this product element completely?")) return;
        const res = await fetch(`${API_BASE}/product?id=${id}`, { method: 'DELETE' });
        if(res.ok) {
            showNotification(await res.text());
            loadAllProducts();
            if(activeCustomerId) loadCustomerCart();
        } else {
            handleResponseError(res);
        }
    }

    // --- CART OPERATIONS ---
    async function loadCustomerCart() {
        if(!activeCustomerId) return;
        const res = await fetch(`${API_BASE}/order/${activeCustomerId}`);
        const container = document.getElementById('cart-items-container');

        if(res.ok) {
            const bill = await res.json();
            container.innerHTML = '';

            if(!bill.cart || bill.cart.length === 0) {
                container.innerHTML = '<p style="color:#565959; text-align:center;">Your cart is currently empty.</p>';
                document.getElementById('cart-total-box').style.display = 'none';
                return;
            }

            document.getElementById('cart-total-box').style.display = 'block';
            document.getElementById('cart-total-amount').innerText = bill.total_amount;

            bill.cart.forEach(item => {
                container.innerHTML += `
                        <div class="cart-item">
                            <div class="cart-item-details">
                                <img src="${item.image_data}" class="cart-item-img" onerror="this.src='https://placehold.co/50x50?text=Box'">
                                <div>
                                    <div style="font-size:14px; font-weight:6px;">Product ID: ${item.product_id}</div>
                                    <div style="color:#B12704; font-size:13px;">₹${item.product_price} each</div>
                                    <div class="qty-counter">
                                        <button class="qty-btn" onclick="adjustCartQty(${JSON.stringify(item).replace(/"/g, '&quot;')}, -1)">-</button>
                                        <span style="font-weight:bold; font-size:14px; padding:0 5px;">${item.quanitity}</span>
                                        <button class="qty-btn" onclick="adjustCartQty(${JSON.stringify(item).replace(/"/g, '&quot;')}, 1)">+</button>
                                    </div>
                                </div>
                            </div>
                            <button class="btn-danger" style="padding:4px 8px; font-size:12px;" onclick="removeFromCart(${item.id})">Delete</button>
                        </div>
                    `;
            });
        } else {
            container.innerHTML = '<p style="color:red; text-align:center;">Failed to resolve active cart calculations.</p>';
            handleResponseError(res);
        }
    }

    async function addToCart(productId) {
        if(!activeCustomerId) return showNotification("Please select/login to a Customer Session ID first!", true);
        const qtyInput = document.getElementById(`qty-input-${productId}`);
        const quanitity = parseInt(qtyInput.value);

        const payload = {
            customerId: activeCustomerId,
            product_id: productId,
            quanitity: quanitity
        };

        const res = await fetch(`${API_BASE}/order`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if(res.ok) {
            showNotification(await res.text());
            loadAllProducts();
            loadCustomerCart();
        } else {
            handleResponseError(res);
        }
    }

    async function adjustCartQty(cartItem, offset) {
        const targetQty = cartItem.quanitity + offset;
        if(targetQty <= 0) {
            return removeFromCart(cartItem.id);
        }

        const payload = {
            id: cartItem.id,
            customerId: cartItem.customerId,
            product_id: item.product_id,
            quanitity: targetQty
        };

        const res = await fetch(`${API_BASE}/order`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if(res.ok) {
            loadAllProducts();
            loadCustomerCart();
        } else {
            handleResponseError(res);
        }
    }

    async function removeFromCart(cartId) {
        const res = await fetch(`${API_BASE}/order?id=${cartId}`, { method: 'DELETE' });
        if(res.ok) {
            showNotification(await res.text());
            loadAllProducts();
            loadCustomerCart();
        } else {
            handleResponseError(res);
        }
    }
</script>
</body>
</html>
