<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrandTickAutoVi - Premium Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0c10; color: #c5c6c7; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 20px; border-bottom: 2px solid #1f2833; background: #11141a; border-radius: 8px; }
        header h1 { color: #66fcf1; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px; }
        .admin-nav-btn { background: #ff4d4d; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .admin-nav-btn:hover { background: #cc0000; }

        .countdown-container { background: linear-gradient(135deg, #1f2833, #0b0c10); border: 1px solid #66fcf1; border-radius: 12px; padding: 30px; margin-bottom: 40px; }
        .countdown-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px dashed #1f2833; padding-bottom: 15px; }
        #countdown-message { color: #45f3ff; font-size: 1.5rem; font-weight: bold; }
        .server-time-box { text-align: right; font-size: 1.1rem; color: #c5c6c7; background: #0b0c10; padding: 8px 15px; border-radius: 6px; border: 1px solid #1f2833; }
        .server-time-box span { color: #66fcf1; font-weight: bold; }

        .timer-display { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .time-box { background: #0b0c10; border: 1px solid #45f3ff; padding: 15px 25px; border-radius: 8px; min-width: 100px; text-align: center; }
        .time-box span { display: block; font-size: 2.5rem; font-weight: bold; color: #fff; }
        .time-box label { font-size: 0.8rem; text-transform: uppercase; color: #66fcf1; }

        .location-selector { text-align: center; }
        .location-btn { background: transparent; border: 1px solid #66fcf1; color: #66fcf1; padding: 8px 20px; margin: 5px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .location-btn:hover, .location-btn.active { background: #66fcf1; color: #0b0c10; }

        h2.section-title { color: #fff; margin-bottom: 20px; border-left: 5px solid #66fcf1; padding-left: 10px; text-transform: uppercase; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .news-card { background: #1f2833; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .news-img { width: 100%; height: 200px; object-fit: cover; }
        .news-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .news-content h3 { color: #fff; margin-bottom: 10px; }
        .news-meta { font-size: 0.85rem; color: #66fcf1; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .news-about { font-size: 0.95rem; line-height: 1.5; margin-bottom: 15px; color: #c5c6c7; }

        .admin-actions-inside-card { display: none; gap: 10px; margin-bottom: 15px; }
        .btn-edit { background: #1f2833; color: #66fcf1; border: 1px solid #66fcf1; padding: 5px; cursor: pointer; border-radius: 4px; flex: 1; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px; cursor: pointer; border-radius: 4px; flex: 1; }

        .ai-section { margin-top: auto; border-top: 1px solid #0b0c10; padding-top: 15px; }
        .ai-input-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .ai-section input { flex-grow: 1; background: #0b0c10; border: 1px solid #c5c6c7; color: #fff; padding: 8px; border-radius: 4px; outline: none; }
        .ai-section button { background: #66fcf1; color: #0b0c10; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .ai-response { background: #0b0c10; color: #45f3ff; font-size: 0.85rem; padding: 10px; border-radius: 4px; border-left: 3px solid #66fcf1; }

        /* MODAL WINDOW POPUP */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-window { background: #11141a; border: 2px solid #ff4d4d; border-radius: 12px; width: 450px; max-width: 90%; padding: 25px; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: transparent; color: #c5c6c7; border: none; font-size: 1.5rem; cursor: pointer; }
        .modal-window h2 { color: #ff4d4d; margin-bottom: 20px; text-transform: uppercase; border-bottom: 1px solid #ff4d4d; padding-bottom: 8px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: #fff; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; background: #0b0c10; border: 1px solid #1f2833; color: #fff; padding: 10px; border-radius: 4px; outline: none; }
        .admin-submit-btn { width: 100%; background: #ff4d4d; color: #fff; border: none; padding: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 4px; }
        #admin-panel-controls { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Grand Tick Auto VI Hub</h1>
        <button class="admin-nav-btn" id="adminGateBtn" onclick="openAdminModal()">Go to Admin Panel 🔒</button>
    </header>

    <section class="countdown-container">
        <div class="countdown-header">
            <div id="countdown-message">Loading Gateway... 🌐</div>
            <div class="server-time-box">Zone Local Time: <span id="server-right-time">00:00:00 AM</span></div>
        </div>

        <div class="timer-display">
            <div class="time-box"><span id="days">00</span><label>Days</label></div>
            <div class="time-box"><span id="hours">00</span><label>Hours</label></div>
            <div class="time-box"><span id="minutes">00</span><label>Minutes</label></div>
            <div class="time-box"><span id="seconds">00</span><label>Seconds</label></div>
        </div>

        <div class="location-selector">
            <button class="location-btn" id="btn-mumbai" onclick="initCountdown('mumbai')">Mumbai</button>
            <button class="location-btn" id="btn-new_york" onclick="initCountdown('new_york')">New York</button>
            <button class="location-btn" id="btn-london" onclick="initCountdown('london')">London</button>
            <button class="location-btn" id="btn-utc" onclick="initCountdown('utc')">Global</button>
        </div>
    </section>

    <h2 class="section-title">Latest Vice City Bulletins</h2>
    <section class="news-grid" id="news-container">
        <p style="color: #66fcf1;">Connecting to Server... 📡</p>
    </section>
</div>

<div class="modal-overlay" id="adminModal">
    <div class="modal-window">
        <button class="modal-close" onclick="closeAdminModal()">&times;</button>
        <h2 id="modal-title">Admin Gateway</h2>

        <div id="admin-login-gate">
            <div class="form-group">
                <label>Admin Username</label>
                <input type="text" id="auth-user" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" id="auth-pass" autocomplete="current-password">
            </div>
            <button type="button" class="admin-submit-btn" onclick="verifyAdminLogin()">Verify Admin</button>
            <p id="login-error" style="color: #ff4d4d; font-size: 0.85rem; margin-top: 10px; text-align: center;"></p>
        </div>

        <div id="admin-panel-controls">
            <p id="admin-status" style="font-size: 0.85rem; margin-bottom: 15px; color: #66fcf1;"></p>
            <form id="newsForm" onsubmit="handleAdminSubmit(event)">
                <input type="hidden" id="newsId" value="">
                <div class="form-group">
                    <label>News Title</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="about" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="image_data" required>
                </div>
                <div class="form-group">
                    <label>Release Date</label>
                    <input type="date" id="date" required>
                </div>
                <button type="submit" class="admin-submit-btn" id="submitFormBtn">Submit Bulletin</button>
                <button type="button" class="admin-submit-btn" id="cancelEditBtn" style="background:#555; display:none; margin-top:5px;" onclick="resetForm()">Cancel Edit</button>
            </form>
        </div>
    </div>
</div>

<script>
    const BASE_URL = "http://localhost:8080/api";
    let countdownInterval;
    let clockInterval;
    let globalSavedAuthHeader = "";
    let isAdminAuthenticated = false;

    // Time management variables
    let currentServerTimeParsed = null;
    let currentTargetZone = "Asia/Kolkata";

    // 1. FIXED TIMEZONE CLOCK: Continuous ticking engine using forced timeZone localization
    function startZoneClock() {
        if (clockInterval) clearInterval(clockInterval);

        clockInterval = setInterval(() => {
            if (currentServerTimeParsed) {
                // Force 1 second local increment
                currentServerTimeParsed.setSeconds(currentServerTimeParsed.getSeconds() + 1);

                // Format the display using Intl mapping directly to target country timezone rules
                const formattedTime = currentServerTimeParsed.toLocaleTimeString("en-US", {
                    timeZone: currentTargetZone,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true
                });

                document.getElementById("server-right-time").innerText = formattedTime;
            }
        }, 1000);
    }

    // 2. FETCH COUNTDOWN & TIMEZONE METRICS
    async function initCountdown(location = "mumbai") {
        // Map location parameter to strict IANA Timezones
        if (location === "mumbai") currentTargetZone = "Asia/Kolkata";
        else if (location === "new_york") currentTargetZone = "America/New_York";
        else if (location === "london") currentTargetZone = "Europe/London";
        else currentTargetZone = "UTC";

        // UI Button Active Styling
        document.querySelectorAll('.location-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${location}`);
        if (activeBtn) activeBtn.classList.add('active');

        try {
            const response = await fetch(`${BASE_URL}/countdown?location=${location}`);
            if (!response.ok) throw new Error("Fetch failed");
            const data = await response.json();

            document.getElementById("countdown-message").innerText = data.countdown.message;

            // Strip the trailing 'Z' if present to prevent JS from overriding the zone back to local IST
            let sanitizedTimeStr = data.rightTime;
            if (sanitizedTimeStr.endsWith('Z')) {
                sanitizedTimeStr = sanitizedTimeStr.slice(0, -1);
            }

            // Parse the native server time
            currentServerTimeParsed = new Date(sanitizedTimeStr);

            // Fire ticking clock right away
            startZoneClock();

            // Sync Target Countdown Clock Logic
            let totalRemainingMs = (
                (data.countdown.days * 24 * 60 * 60 * 1000) +
                (data.countdown.hours * 60 * 60 * 1000) +
                (data.countdown.minute * 60 * 1000) +
                (data.countdown.seconds * 1000)
            );

            let targetTime = Date.now() + totalRemainingMs;

            if (countdownInterval) clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                const difference = targetTime - Date.now();

                if (difference <= 0) {
                    document.getElementById("timer").innerHTML = "<h2 style='color:#66fcf1;'>LAUNCHED WORLDWIDE! 🚀</h2>";
                    clearInterval(countdownInterval);
                    return;
                }

                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                document.getElementById("days").innerText = String(days).padStart(2, '0');
                document.getElementById("hours").innerText = String(hours).padStart(2, '0');
                document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
                document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
            }, 1000);

        } catch (error) {
            console.error(error);
            document.getElementById("countdown-message").innerText = "Sync Failed.";
        }
    }

    // 3. READ ALL NEWS BULLETIN PANELS
    async function loadNews() {
        try {
            const response = await fetch(`${BASE_URL}/news/public/allNews`);
            const newsList = await response.json();
            const newsContainer = document.getElementById("news-container");
            newsContainer.innerHTML = "";

            newsList.forEach(news => {
                const card = `
                        <div class="news-card">
                            <img src="${news.image_data}" class="news-img" />
                            <div class="news-content">
                                <h3>${news.title}</h3>
                                <div class="news-meta">
                                    <span>📅 ${news.date || 'TBA'}</span>
                                    <span style="color:#ff4d4d; font-weight:bold; display:${isAdminAuthenticated ? 'inline' : 'none'};">ID: ${news.id}</span>
                                </div>
                                <p class="news-about">${news.about}</p>

                                <div class="admin-actions-inside-card" style="display:${isAdminAuthenticated ? 'flex' : 'none'};">
                                    <button class="btn-edit" onclick='populateEditForm(${JSON.stringify(news)})'>Edit</button>
                                    <button class="btn-delete" onclick="deleteNews(${news.id})">Delete</button>
                                </div>

                                <div class="ai-section">
                                    <div class="ai-input-group">
                                        <input type="text" id="ai-input-${news.id}" placeholder="Ask Gemini..." />
                                        <button onclick="askAI(${news.id})">Ask AI</button>
                                    </div>
                                    <div class="ai-response" id="ai-response-${news.id}">AI Ready... ✨</div>
                                </div>
                            </div>
                        </div>
                    `;
                newsContainer.innerHTML += card;
            });
        } catch (err) {
            document.getElementById("news-container").innerHTML = "<p style='color:#ff4d4d;'>Feed connectivity issue.</p>";
        }
    }

    // 4. ADMIN SEPARATE POPUP LOGIC & VERIFICATION
    function openAdminModal() { document.getElementById("adminModal").classList.add("active"); }
    function closeAdminModal() { document.getElementById("adminModal").classList.remove("active"); }

    function verifyAdminLogin() {
        const user = document.getElementById("auth-user").value;
        const pass = document.getElementById("auth-pass").value;
        const errorDiv = document.getElementById("login-error");

        const computedHeader = "Basic " + btoa(`${user}:${pass}`);

        fetch(`${BASE_URL}/news/public/allNews`, {
            headers: { "Authorization": computedHeader }
        })
            .then(res => {
                if(res.ok) {
                    globalSavedAuthHeader = computedHeader; // Save the validated credential token securely
                    isAdminAuthenticated = true;

                    document.getElementById("admin-login-gate").style.display = "none";
                    document.getElementById("admin-panel-controls").style.display = "block";
                    document.getElementById("modal-title").innerText = "Admin Workspace Active";
                    document.getElementById("adminGateBtn").innerText = "Admin Workspace Open 🔓";

                    loadNews();
                } else {
                    errorDiv.innerText = "Incorrect Credentials!";
                }
            })
            .catch(() => errorDiv.innerText = "Server Unreachable.");
    }

    // 5. SECURE ADMIN DISPATCHERS (POST / PUT / DELETE)
    async function handleAdminSubmit(event) {
        event.preventDefault();
        const id = document.getElementById("newsId").value;
        const payload = {
            title: document.getElementById("title").value,
            about: document.getElementById("about").value,
            image_data: document.getElementById("image_data").value,
            date: document.getElementById("date").value
        };

        let url = `${BASE_URL}/news/admin/post`;
        let method = "POST";

        if (id) {
            payload.id = parseInt(id);
            url = `${BASE_URL}/news/admin/put`;
            method = "PUT";
        }

        try {
            const response = await fetch(url, {
                method: method,
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": globalSavedAuthHeader // FIX: Passing auth header during POST/PUT operations
                },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                resetForm();
                loadNews();
                closeAdminModal();
                alert("Operation Successful!");
            } else {
                alert("403 Forbidden: Check user role permissions in Spring Boot backend.");
            }
        } catch { alert("Failed transaction."); }
    }

    async function deleteNews(id) {
        if (!confirm(`Delete item ID: ${id}?`)) return;
        try {
            const response = await fetch(`${BASE_URL}/news/admin/delete/${id}`, {
                method: 'DELETE',
                headers: { "Authorization": globalSavedAuthHeader }
            });
            if (response.ok) { loadNews(); }
        } catch (err) { console.error(err); }
    }

    function populateEditForm(news) {
        openAdminModal();
        document.getElementById("newsId").value = news.id;
        document.getElementById("title").value = news.title;
        document.getElementById("about").value = news.about;
        document.getElementById("image_data").value = news.image_data;
        document.getElementById("date").value = news.date;
        document.getElementById("submitFormBtn").innerText = "Update Bulletin";
        document.getElementById("cancelEditBtn").style.display = "block";
    }

    function resetForm() {
        document.getElementById("newsId").value = "";
        document.getElementById("newsForm").reset();
        document.getElementById("submitFormBtn").innerText = "Submit Bulletin";
        document.getElementById("cancelEditBtn").style.display = "none";
    }

    async function askAI(newsId) {
        const userInput = document.getElementById(`ai-input-${newsId}`).value;
        const responseDiv = document.getElementById(`ai-response-${newsId}`);
        if(!userInput.trim()) return;
        responseDiv.innerText = "Thinking... 🤔";
        try {
            const res = await fetch(`${BASE_URL}/news/public/explainer`, {
                method: 'GET',
                headers: { 'id': newsId, 'user_message': userInput }
            });
            responseDiv.innerText = await res.text();
        } catch { responseDiv.innerText = "AI Failed."; }
    }

    window.onload = () => {
        initCountdown("mumbai");
        loadNews();
    };
</script>
</body>
</html>
